services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trackflow
      POSTGRES_USER: trackflow
      POSTGRES_PASSWORD: trackflow
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./apps/backend
    depends_on: [postgres]
    environment:
      DATABASE_URL: postgres://trackflow:trackflow@postgres:5432/trackflow
    ports: ["3000:3000"]

  web:
    build: ./apps/web
    depends_on: [backend]
    ports: ["3001:3000"]

volumes:
  pgdata:
